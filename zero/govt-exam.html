<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Govt Exams ŌĆö JioBharatIQ</title>

<style>
  body { background: var(--white); }
  .phone-frame { background: var(--white); }
  :root {
    --vert-accent: var(--sparkle-50);          /* official blue */
    --vert-accent-light: var(--sparkle-20);
    --vert-accent-dark: var(--sparkle-60);
  }

  /* ============= TOP BAR ============== */
  .top-bar {
    height: 56px; padding: 0 var(--space-4);
    display: flex; align-items: center; gap: var(--space-3);
    background: var(--white); flex-shrink: 0;
    border-bottom: 1px solid transparent; position: relative; z-index: 30;
  }
  .top-bar .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface-ghost); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: var(--grey-100);
  }
  .top-bar .title-area { flex: 1; min-width: 0; }
  .top-bar .title-area .t1 { font-size: 16px; font-weight: 600; color: var(--grey-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-bar .title-area .t2 { font-size: 11px; font-weight: 500; color: var(--grey-60); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ============= VIEW SWITCHING ============== */
  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }
  .view-body { flex: 1; overflow-y: auto; padding: var(--space-3) 0 var(--space-7); }
  .section-h {
    font-size: 11px; font-weight: 600; color: var(--grey-60);
    letter-spacing: 0.6px; text-transform: uppercase;
    margin: var(--space-5) var(--space-4) var(--space-3);
  }

  /* ============= COUNSELLOR ENTRY CARD ============== */
  .counsel-card {
    width: calc(100% - 2 * var(--space-4));
    margin: var(--space-3) var(--space-4) 0;
    display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: 16px;
    background: var(--vert-accent); color: white;
    cursor: pointer; transition: transform 0.15s; text-align: left;
    border: none; font-family: var(--font);
  }
  .counsel-card:hover { transform: translateY(-2px); }
  .counsel-card .cc-ic {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    background: rgba(255,255,255,0.18); color: white;
    display: flex; align-items: center; justify-content: center;
  }
  .counsel-card .cc-text { flex: 1; min-width: 0; }
  .counsel-card .cc-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .counsel-card .cc-sub { font-size: 12px; font-weight: 500; opacity: 0.9; margin-top: 3px; line-height: 1.35; }
  .counsel-card .cc-arrow { flex-shrink: 0; opacity: 0.9; }

  /* ============= CATEGORY ROWS ============== */
  .cat-scroll {
    display: flex; gap: 10px; overflow-x: auto;
    padding: 0 var(--space-4) 4px; scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-tile {
    flex: 0 0 160px; text-align: left;
    border: 1px solid var(--grey-40); border-radius: 14px;
    padding: 14px; background: white; cursor: pointer;
    font-family: var(--font); display: flex; flex-direction: column; gap: 6px;
    min-height: 96px; transition: all 0.15s;
  }
  .cat-tile:hover { border-color: var(--vert-accent); transform: translateY(-2px); }
  .cat-tile .ct-badge {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--vert-accent-light);
    display: flex; align-items: center; justify-content: center; font-size: 19px; line-height: 1;
  }
  .cat-tile .ct-title { font-size: 14px; font-weight: 600; color: var(--grey-100); line-height: 1.2; letter-spacing: -0.2px; }
  .cat-tile .ct-meta { font-size: 11px; color: var(--text-low); font-weight: 600; margin-top: auto; line-height: 1.3; }

  /* ============= IN-CHAT CARDS ============== */
  .elig-card, .recommend-card, .quiz-setup, .quiz-card, .flash-card {
    align-self: stretch; background: white;
    border: 1px solid var(--stroke-subtle); border-radius: 16px;
    padding: 16px; margin: 4px 0 8px; box-shadow: var(--shadow-sm);
  }

  /* Eligibility card (shown at top of an exam) */
  .elig-card { background: linear-gradient(160deg, var(--vert-accent-light) 0%, var(--surface-ghost) 100%); border-color: #cfe0f4; }
  .elig-card .el-h { font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--vert-accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .elig-card .el-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid rgba(31,78,140,0.12); }
  .elig-card .el-row:last-of-type { border-bottom: none; }
  .elig-card .el-k { flex: 0 0 92px; font-size: 12px; font-weight: 600; color: var(--vert-accent-dark); }
  .elig-card .el-v { flex: 1; font-size: 13px; font-weight: 500; color: var(--grey-100); line-height: 1.35; }
  .elig-card .el-reality { margin-top: 10px; font-size: 12px; font-weight: 600; color: var(--text-low); background: rgba(255,255,255,0.6); border-radius: 10px; padding: 8px 10px; line-height: 1.4; }

  /* Onboarding (counsellor) card */
  .onb-card { align-self: stretch; background: white; border: 1px solid var(--stroke-subtle); border-radius: 16px; padding: 16px; margin: 4px 0 8px; box-shadow: var(--shadow-sm); }
  .onb-h { font-size: 15px; font-weight: 600; color: var(--grey-100); letter-spacing: -0.2px; }
  .onb-sub { font-size: 12.5px; color: var(--text-low); font-weight: 500; margin: 3px 0 14px; line-height: 1.4; }
  .onb-group { margin-bottom: 13px; }
  .onb-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; color: var(--vert-accent); margin-bottom: 7px; }
  .onb-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .onb-chip {
    border: 1px solid var(--grey-40); background: white;
    border-radius: var(--radius-pill); padding: 7px 13px;
    font-family: var(--font); font-size: 12.5px; font-weight: 600; color: var(--text-high);
    cursor: pointer; transition: all 0.12s;
  }
  .onb-chip:hover { border-color: var(--vert-accent); }
  .onb-chip.sel { background: var(--vert-accent); border-color: var(--vert-accent); color: white; }
  .onb-go {
    width: 100%; margin-top: 6px; background: var(--vert-accent); color: white;
    border: none; border-radius: var(--radius-pill); padding: 12px;
    font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .onb-go:active { transform: scale(0.99); }

  /* Recommend card */
  .recommend-card { cursor: pointer; transition: all 0.15s; }
  .recommend-card:hover { border-color: var(--vert-accent); transform: translateY(-2px); }
  .recommend-card .rc-top { display: flex; align-items: center; gap: 11px; }
  .recommend-card .rc-emoji { width: 38px; height: 38px; border-radius: 11px; background: var(--vert-accent-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .recommend-card .rc-name { font-size: 15px; font-weight: 600; color: var(--grey-100); }
  .recommend-card .rc-cat { font-size: 11.5px; font-weight: 600; color: var(--text-low); }
  .recommend-card .rc-why { font-size: 12.5px; color: var(--grey-90); line-height: 1.45; margin-top: 9px; }
  .recommend-card .rc-why b { color: var(--vert-accent-dark); }

  /* Quiz setup */
  .quiz-setup .qs-h { font-size: 15px; font-weight: 600; color: var(--grey-100); margin-bottom: 3px; }
  .quiz-setup .qs-sub { font-size: 12.5px; color: var(--text-low); margin-bottom: 13px; line-height: 1.4; }
  .quiz-setup .qs-free { width: 100%; box-sizing: border-box; border: 1px solid var(--grey-40); border-radius: 12px; padding: 11px 13px; font-family: var(--font); font-size: 13.5px; color: var(--grey-100); margin-top: 4px; }
  .quiz-setup .qs-free::placeholder { color: var(--grey-60); }

  /* Quiz card */
  .quiz-card .qz-tag { font-size: 10.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--vert-accent); }
  .quiz-card .qz-q { font-size: 15px; font-weight: 600; color: var(--grey-100); line-height: 1.4; margin: 7px 0 12px; }
  .quiz-card .qz-opt {
    display: flex; align-items: center; gap: 10px; width: 100%;
    border: 1px solid var(--grey-40); border-radius: 12px; padding: 11px 13px;
    background: white; font-family: var(--font); font-size: 13.5px; font-weight: 600; color: var(--grey-100);
    cursor: pointer; margin-bottom: 8px; text-align: left; transition: all 0.12s;
  }
  .quiz-card .qz-opt:hover { border-color: var(--vert-accent); }
  .quiz-card .qz-opt .qz-letter { width: 24px; height: 24px; border-radius: 7px; background: var(--surface-ghost); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .quiz-card .qz-opt.correct { border-color: #1d8a3a; background: #ecfbf0; }
  .quiz-card .qz-opt.correct .qz-letter { background: #1d8a3a; color: white; }
  .quiz-card .qz-opt.wrong { border-color: #d24545; background: #fdeeee; }
  .quiz-card .qz-opt.wrong .qz-letter { background: #d24545; color: white; }
  .quiz-card .qz-opt:disabled { cursor: default; }
  .quiz-card .qz-explain { font-size: 12.5px; line-height: 1.5; color: var(--grey-90); background: var(--surface-ghost); border-radius: 12px; padding: 11px 12px; margin-top: 4px; }
  .quiz-card .qz-explain b { color: var(--vert-accent-dark); }

  /* Flashcard */
  /* ===== Card carousel (flashcards + quiz): one card in view, arrow nav ===== */
  .cardx { align-self: stretch; flex-shrink: 0; position: relative; overflow: hidden; margin: 4px 0 2px; }
  .cardx-track { display: flex; align-items: flex-start; width: 100%; transition: transform 0.34s cubic-bezier(.4,0,.2,1); }
  .cardx-slide { flex: 0 0 100%; width: 100%; box-sizing: border-box; }
  .cardx-slide .quiz-card { margin: 0; }
  .cardx-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 2px 0 4px; }
  .cardx-arrow { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--grey-40); background: white; color: var(--vert-accent); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .cardx-arrow:hover:not(:disabled) { border-color: var(--vert-accent); background: var(--vert-accent-light); }
  .cardx-arrow:disabled { opacity: 0.3; cursor: default; }
  .cardx-arrow:active:not(:disabled) { transform: scale(0.92); }
  .cardx-count { font-size: 12.5px; font-weight: 600; color: var(--text-low); min-width: 86px; text-align: center; }
  .cardx-switch { text-align: center; margin: 0 0 8px; }
  .cardx-switch button { background: none; border: none; color: var(--vert-accent); font-family: var(--font); font-size: 12.5px; font-weight: 600; cursor: pointer; }

  /* Flip flashcard */
  .flip { height: 224px; perspective: 1100px; cursor: pointer; display: block; }
  .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(.4,.15,.2,1); transform-style: preserve-3d; }
  .flip.open .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back { position: absolute; inset: 0; overflow: hidden; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 16px; padding: 16px; box-sizing: border-box; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
  .flip-front { background: linear-gradient(135deg, #f3f0ff 0%, var(--surface-ghost) 100%); border: 1px solid var(--primary-20); }
  .flip-back { background: linear-gradient(135deg, var(--vert-accent-light) 0%, #eef4fc 100%); border: 1px solid #cfe0f4; transform: rotateY(180deg); opacity: 0; }
  .fl-tag { font-size: 10.5px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--vert-accent); }
  .fl-q { font-size: 17px; font-weight: 600; color: var(--grey-100); line-height: 1.3; margin: 8px 0 0; }
  .fl-a-label { font-size: 11px; font-weight: 600; color: var(--text-low); text-transform: uppercase; letter-spacing: 0.3px; }
  .fl-a-text { font-size: 19px; font-weight: 600; color: var(--vert-accent-dark); margin: 4px 0 8px; line-height: 1.2; }
  .fl-eg { font-size: 12.5px; color: var(--grey-90); line-height: 1.45; }
  .fl-hint { margin-top: auto; font-size: 11px; font-weight: 600; color: var(--text-low); }

  /* In-chat option buttons */
  .opt-stack { align-self: stretch; display: flex; flex-direction: column; gap: 9px; margin: 6px 0 8px; }
  .opt-btn {
    border: 1px solid var(--stroke-subtle); background: white;
    border-radius: 14px; padding: 13px 14px; font-family: var(--font);
    font-size: 14px; font-weight: 600; color: var(--text-high);
    cursor: pointer; display: flex; align-items: center; gap: 11px; text-align: left; transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--vert-accent); }
  .opt-btn .ob-ic { flex-shrink: 0; width: 32px; height: 32px; border-radius: 9px; background: var(--vert-accent-light); color: var(--vert-accent); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .opt-btn .ob-t { display: flex; flex-direction: column; }
  .opt-btn .ob-sub { font-size: 11.5px; font-weight: 500; color: var(--text-low); margin-top: 1px; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(10px);
    background: var(--grey-100); color: white; font-size: 13px; font-weight: 600;
    padding: 10px 16px; border-radius: var(--radius-pill); opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 200; white-space: nowrap; max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

/* =========================================================================

function renderHome() {
  const host = document.getElementById('cat_host');
  host.innerHTML = '';
  EXAM_CATS.forEach(cat => {
    const section = document.createElement('div');
    section.innerHTML = `<div class="section-h">${cat.name}</div><div class="cat-scroll"></div>`;
    const scroll = section.querySelector('.cat-scroll');
    cat.exams.forEach(e => {
      const tile = document.createElement('button');
      tile.className = 'cat-tile';
      tile.innerHTML = `
        <span class="ct-badge">${e.emoji}</span>
        <span class="ct-title">${e.name}</span>
        <span class="ct-meta">${e.meta}</span>`;
      tile.onclick = () => openExam(e.id);
      scroll.appendChild(tile);
    });
    host.appendChild(section);
  });
}

function chatC() { return document.getElementById('counselChat'); }
function chatE() { return document.getElementById('examChat'); }

/* =========================================================================
 * COUNSELLOR ŌĆö in-chat onboarding -> recommended exams
 * ========================================================================= */
let counselPick = { goal: null, qual: null, age: null, cat: null };

function openCounsel(prefill) {
  counselPick = { goal: null, qual: null, age: null, cat: null };
  if (prefill && prefill.cat) counselPick.cat = prefill.cat;
  showView('counsel');
  const chat = chatC();
  chat.innerHTML = '';
  window.GC.appendAi(chat, "I'll help you find the right exam to reach your goals. Tell me a bit about yourself ŌĆö pick what fits.");
  setTimeout(() => showOnboarding(), 650);
}

function showOnboarding() {
  const chat = chatC();
  const card = document.createElement('div');
  card.className = 'onb-card';
  const groups = [
    { key: 'goal', label: 'What matters most to you?', opts: ['A govt job soon', 'Highest salary', 'Stay near home', 'Prestige / officer rank', 'Job security'] },
    { key: 'qual', label: 'Your highest qualification', opts: ['10th', '12th pass', 'Graduate', 'Postgraduate', 'Engineering (B.E./B.Tech)'] },
    { key: 'age',  label: 'Your age', opts: ['Under 18', '18ŌĆō21', '22ŌĆō25', '26ŌĆō30', '31+'] },
    { key: 'cat',  label: 'Your category', opts: ['General', 'OBC', 'SC', 'ST', 'EWS'] },
  ];
  card.innerHTML =
    `<div class="onb-h">A few quick questions</div>
     <div class="onb-sub">No right answers ŌĆö this just helps me shortlist exams worth your time.</div>` +
    groups.map(g => `
      <div class="onb-group" data-key="${g.key}">
        <div class="onb-label">${g.label}</div>
        <div class="onb-chips">
          ${g.opts.map(o => `<button class="onb-chip${counselPick[g.key] === o ? ' sel' : ''}" data-k="${g.key}" data-v="${o}">${o}</button>`).join('')}
        </div>
      </div>`).join('') +
    `<button class="onb-go">Find my exams ŌåÆ</button>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;

  card.querySelectorAll('.onb-chip').forEach(ch => {
    ch.onclick = () => {
      const k = ch.dataset.k;
      card.querySelectorAll(`.onb-chip[data-k="${k}"]`).forEach(x => x.classList.remove('sel'));
      ch.classList.add('sel');
      counselPick[k] = ch.dataset.v;
    };
  });
  card.querySelector('.onb-go').onclick = () => recommendExams();
}

function recommendExams() {
  const chat = chatC();
  // Echo the choices as a user bubble, then recommend.
  const said = [counselPick.goal, counselPick.qual && ('Qualified: ' + counselPick.qual), counselPick.age && (counselPick.age + ' yrs')]
    .filter(Boolean).join(' ┬Ę ') || 'Here are my details';
  window.GC.appendUser(chat, said);

  // Simple rules engine (placeholder for the real recommendation engine later).
  let ids = [];
  const q = counselPick.qual || 'Graduate';
  if (q === '10th') ids = ['ssc-mts', 'ssc-gd', 'rrb-groupd'];
  else if (q === '12th pass') ids = ['ssc-chsl', 'rrb-ntpc', 'nda'];
  else if (q === 'Engineering (B.E./B.Tech)') ids = ['gate', 'ssc-je', 'rrb-je'];
  else if (q === 'Postgraduate') ids = ['ugc-net', 'rbi-grade-b', 'upsc-cse'];
  else ids = ['ibps-po', 'ssc-cgl', 'rrb-ntpc'];

  if (counselPick.goal === 'Highest salary') ids = uniq(['rbi-grade-b', 'sbi-po', ...ids]);
  if (counselPick.goal === 'Prestige / officer rank') ids = uniq(['upsc-cse', 'ibps-po', ...ids]);
  if (counselPick.goal === 'Stay near home') ids = uniq(['bpsc', 'uppsc', ...ids]);
  ids = ids.slice(0, 3);

  const why = {
    'ibps-po': 'A graduate-friendly officer role with nationwide vacancies every year.',
    'ssc-cgl': 'The widest graduate-level door ŌĆö thousands of posts across ministries.',
    'rrb-ntpc': 'Stable railway career, large intake, moderate competition.',
    'ssc-mts': 'Entry-level central govt job you can target right after 10th.',
    'ssc-gd': 'Uniformed force entry with 10th-level eligibility.',
    'rrb-groupd': 'High-vacancy railway entry, 10th/ITI eligible.',
    'ssc-chsl': 'Best 12th-pass route into central govt clerical posts.',
    'nda': 'A 12th-level path to becoming an officer in the armed forces.',
    'gate': 'Unlocks PSU jobs and M.Tech ŌĆö built for engineers.',
    'ssc-je': 'Junior Engineer posts that value your diploma/degree.',
    'rrb-je': 'Engineering-stream railway posts with good stability.',
    'ugc-net': 'The route to lectureship and JRF for postgraduates.',
    'rbi-grade-b': 'The highest-paid banking role ŌĆö best after some prep maturity.',
    'sbi-po': "The biggest banking brand ŌĆö tough, but opens doors everywhere.",
    'upsc-cse': 'The peak of civil services ŌĆö pair it with a realistic fallback.',
    'bpsc': 'Stay in Bihar with a respected state-services posting.',
    'uppsc': 'Stay in UP with a respected state-services posting.',
  };

  setTimeout(() => {
    window.GC.appendAi(chat, "Based on that, these three are worth a serious look. Tap any one to see eligibility and start practising:");
    setTimeout(() => {
      ids.forEach((id, n) => setTimeout(() => {
        const info = EXAM_INDEX[id]; if (!info) return;
        const card = document.createElement('div');
        card.className = 'recommend-card';
        card.innerHTML = `
          <div class="rc-top">
            <span class="rc-emoji">${info.exam.emoji}</span>
            <span><span class="rc-name">${info.exam.name}</span><br><span class="rc-cat">${info.catName}</span></span>
          </div>
          <div class="rc-why">${why[id] || ('A strong fit for your profile in ' + info.catName + '.')}</div>`;
        card.onclick = () => openExam(id);
        chat.appendChild(card);
        chat.scrollTop = chat.scrollHeight;
      }, n * 280));
    }, 500);
  }, 500);
}

function counselAsk() {

  window.GC.appendUser(chat, 'How do I decide between two of these?');

let prep = { examId: null, flashIdx: 0, quizIdx: 0, quizPlan: null, quizDone: 0 };

function openExam(examId) {
  const info = EXAM_INDEX[examId];
  if (!info) return;
  prep = { examId, flashIdx: 0, quizIdx: 0, quizPlan: null, quizDone: 0 };
  document.getElementById('exam_title').textContent = info.exam.name;
  document.getElementById('exam_sub').textContent = info.catName;
  showView('exam');
  const chat = chatE();
  chat.innerHTML = '';

  // Eligibility card FIRST.
  const el = eligFor(examId);
  const card = document.createElement('div');
  card.className = 'elig-card';
  card.innerHTML = `
    <div class="el-h">Ō£ģ Eligibility ┬Ę ${info.exam.name}</div>
    <div class="el-row"><div class="el-k">Age</div><div class="el-v">${el.age}</div></div>
    <div class="el-row"><div class="el-k">Qualification</div><div class="el-v">${el.qual}</div></div>
    <div class="el-row"><div class="el-k">Attempts</div><div class="el-v">${el.attempts}</div></div>
    ${el.reality ? `<div class="el-reality">­¤ōŖ ${el.reality}</div>` : ''}`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    window.GC.appendAi(chat, `Here's the eligibility for ${info.exam.name}. Ready to prepare? Pick how you want to start ŌĆö you can keep going as long as you like.`);
    setTimeout(() => showPrepOptions(), 550);
  }, 400);
}

function showPrepOptions() {
  const chat = chatE();
  const stack = document.createElement('div');
  stack.className = 'opt-stack';
  stack.innerHTML = `
    <button class="opt-btn" data-go="flash">
      <span class="ob-ic">­¤āÅ</span>
      <span class="ob-t">Practice flashcards<span class="ob-sub">Quick recall ŌĆö one card at a time</span></span>
    </button>
    <button class="opt-btn" data-go="quiz">
      <span class="ob-ic">­¤ōØ</span>
      <span class="ob-t">Start a quiz<span class="ob-sub">Choose length or topics, then solve</span></span>
    </button>`;
  chat.appendChild(stack);
  chat.scrollTop = chat.scrollHeight;
  stack.querySelector('[data-go="flash"]').onclick = () => { stack.remove(); startFlashcards(); };
  stack.querySelector('[data-go="quiz"]').onclick = () => { stack.remove(); showQuizSetup(); };
}

/* ---------- Card carousel ŌĆö flashcards + quiz share one swipeable widget
 * (left/right arrows, flip on reveal, slide on advance) instead of stacking. ---------- */
const CHEV_L = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const CHEV_R = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function startFlashcards() {
  const chat = chatE();
  window.GC.appendAi(chat, "Flashcards it is. Tap a card to flip it, and use the arrows to move through them.");
  setTimeout(() => buildCardx('flash'), 450);
}

function buildCardx(kind) {
  const chat = chatE();
  const wrap = document.createElement('div'); wrap.className = 'cardx';
  const track = document.createElement('div'); track.className = 'cardx-track';
  wrap.appendChild(track);
  const nav = document.createElement('div'); nav.className = 'cardx-nav';
  nav.innerHTML = `<button class="cardx-arrow prev" aria-label="Previous" disabled>${CHEV_L}</button><div class="cardx-count"></div><button class="cardx-arrow next" aria-label="Next">${CHEV_R}</button>`;
  const sw = document.createElement('div'); sw.className = 'cardx-switch';
  sw.innerHTML = `<button>${kind === 'flash' ? 'Switch to a quiz' : 'Switch to flashcards'}</button>`;
  chat.appendChild(wrap); chat.appendChild(nav); chat.appendChild(sw);

  const state = { kind, idx: 0, ptr: 0, track, wrap, nav };
  addSlide(state);
  goCardx(state, 0);
  nav.querySelector('.next').onclick = () => {
    if (state.idx >= track.children.length - 1) addSlide(state);   // endless ŌĆö append on demand
    goCardx(state, state.idx + 1);
  };
  nav.querySelector('.prev').onclick = () => goCardx(state, state.idx - 1);
  sw.querySelector('button').onclick = () => { if (kind === 'flash') showQuizSetup(); else startFlashcards(); };
  chat.scrollTop = chat.scrollHeight;
}

function addSlide(state) {
  const slide = document.createElement('div'); slide.className = 'cardx-slide';
  slide.appendChild(state.kind === 'flash' ? makeFlashSlide(state) : makeQuizSlide(state));
  state.track.appendChild(slide);
}

function goCardx(state, idx) {
  idx = Math.max(0, Math.min(idx, state.track.children.length - 1));
  state.idx = idx;
  state.track.style.transform = 'translateX(' + (-idx * 100) + '%)';   // slide animation
  state.nav.querySelector('.cardx-count').textContent = (state.kind === 'flash' ? 'Card ' : 'Question ') + (idx + 1);
  state.nav.querySelector('.prev').disabled = idx === 0;
}

function makeFlashSlide(state) {
  const f = FLASH_BANK[state.ptr % FLASH_BANK.length]; state.ptr++;
  const flip = document.createElement('div'); flip.className = 'flip';
  flip.innerHTML = `
    <div class="flip-inner">
      <div class="flip-front">
        <div class="fl-tag">${f.tag}</div>
        <div class="fl-q">${f.q}</div>
        <div class="fl-hint">Tap to flip Ōå║</div>
      </div>
      <div class="flip-back">
        <div class="fl-a-label">Answer</div>
        <div class="fl-a-text">${f.a}</div>
        <div class="fl-eg">${f.eg}</div>
        <div class="fl-hint">Tap to flip back Ōå║</div>
      </div>
    </div>`;
  flip.onclick = () => {
    const open = !flip.classList.contains('open');
    flip.classList.toggle('open', open);              // 3D rotateY animation (where composited)
    const fr = flip.querySelector('.flip-front'), bk = flip.querySelector('.flip-back');
    setTimeout(() => { fr.style.opacity = open ? '0' : '1'; bk.style.opacity = open ? '1' : '0'; }, 270);  // swap faces at the midpoint
  };
  return flip;
}

function makeQuizSlide(state) {
  const item = QUIZ_BANK[state.ptr % QUIZ_BANK.length]; state.ptr++;
  const card = document.createElement('div'); card.className = 'quiz-card';
  card.innerHTML = `
    <div class="qz-tag">${item.tag}</div>
    <div class="qz-q">${item.q}</div>
    <div class="qz-opts">
      ${item.options.map(o => `<button class="qz-opt" data-l="${o.l}"><span class="qz-letter">${o.l}</span><span>${o.t}</span></button>`).join('')}
    </div>`;
  const opts = card.querySelectorAll('.qz-opt');
  opts.forEach(btn => {
    btn.onclick = () => {
      opts.forEach(b => b.disabled = true);
      const chosen = btn.dataset.l;
      opts.forEach(b => { if (b.dataset.l === item.correct) b.classList.add('correct'); });
      if (chosen !== item.correct) btn.classList.add('wrong');
      const ex = document.createElement('div'); ex.className = 'qz-explain';
      ex.innerHTML = (chosen === item.correct ? 'Ō£ģ <b>Correct.</b> ' : 'ŌØī <b>Not quite.</b> ') + item.explain;
      card.appendChild(ex);   // carousel is auto-height, so it grows to fit the explanation
    };
  });
  return card;
}

/* ---------- Quiz (setup -> endless questions) ---------- */
function showQuizSetup() {
  const chat = chatE();
  const card = document.createElement('div');
  card.className = 'quiz-setup';
  card.innerHTML = `
    <div class="qs-h">Set up your quiz</div>
    <div class="qs-sub">Pick how many questions or how long ŌĆö or type the topics you want to test.</div>
    <div class="onb-group"><div class="onb-label">Number of questions</div>
      <div class="onb-chips" data-grp="count">
        <button class="onb-chip" data-v="5">5 questions</button>
        <button class="onb-chip" data-v="10">10 questions</button>
        <button class="onb-chip" data-v="20">20 questions</button>
      </div></div>
    <div class="onb-group"><div class="onb-label">Or set a timer</div>
      <div class="onb-chips" data-grp="time">
        <button class="onb-chip" data-v="5">5 min</button>
        <button class="onb-chip" data-v="10">10 min</button>
        <button class="onb-chip" data-v="15">15 min</button>
      </div></div>
    <div class="onb-group"><div class="onb-label">Or topics to focus on</div>
      <input class="qs-free" type="text" placeholder="e.g. Quant, Reasoning, Banking awarenessŌĆ”">
    </div>
    <button class="onb-go">Start quiz ŌåÆ</button>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;

  let plan = { mode: 'count', count: 10, mins: null, topics: '' };
  card.querySelectorAll('.onb-chips').forEach(grp => {
    grp.querySelectorAll('.onb-chip').forEach(ch => {
      ch.onclick = () => {
        card.querySelectorAll('.onb-chip').forEach(x => x.classList.remove('sel'));
        ch.classList.add('sel');
        if (grp.dataset.grp === 'count') { plan = { mode: 'count', count: +ch.dataset.v, topics: plan.topics }; }
        else { plan = { mode: 'time', mins: +ch.dataset.v, topics: plan.topics }; }
      };
    });
  });
  const free = card.querySelector('.qs-free');
  free.oninput = () => { plan.topics = free.value.trim(); };
  card.querySelector('.onb-go').onclick = () => { card.querySelector('.onb-go').disabled = true; startQuiz(plan); };
}

function startQuiz(plan) {
  prep.quizPlan = plan;
  const chat = chatE();
  const line = plan.topics ? `Focusing on ŌĆ£${plan.topics}ŌĆØ. Use the arrows to move between questions.`
    : plan.mode === 'time' ? `${plan.mins}-minute drill ŌĆö solve as many as you can; arrows to navigate.`
    : `${plan.count} questions to start with ŌĆö there's no finish line, keep going as long as you like.`;
  window.GC.appendAi(chat, line);
  setTimeout(() => buildCardx('quiz'), 450);
}

function examAsk() {
  const chat = chatE();
  window.GC.appendUser(chat, 'Can you explain that more simply?');
  setTimeout(() => window.GC.appendAi(chat, "Sure ŌĆö read the explanation on the card above slowly; the bold part is the rule to remember. When it clicks, tap Next and try a similar one. Repetition is what makes it stick. ­¤æŹ"), 450);
}

/* =========================================================================
 * TOAST
 * ========================================================================= */
let toastT;
function showToast(text) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1900);
}

function uniq(arr) { return arr.filter((v, i) => arr.indexOf(v) === i); }

/* =========================================================================
 * INIT ŌĆö honour ?q= / ?from= deep links from the landing page
 * ========================================================================= */
(function init() {
  if (window.JDS && window.JDS.renderIcons) window.JDS.renderIcons();
  renderHome();
  const params = new URLSearchParams(location.search);
  const q = (params.get('q') || '').toLowerCase();
  if (q) {
    // Try to match a query to an exam, else open the counsellor.
    const hit = Object.keys(EXAM_INDEX).find(id =>
      id.replace(/-/g, ' ').includes(q) || EXAM_INDEX[id].exam.name.toLowerCase().includes(q));
    if (hit) { openExam(hit); return; }
    if (/which|kaunsa|pick|help|counsel|exam/.test(q)) openCounsel();
  }
})();
</script>
