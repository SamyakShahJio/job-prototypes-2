<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="var(--surface-bold)">
<title>Micro Learning — JioBharatIQ</title>
<link rel="stylesheet" href="shared/jds-tokens.css">
<link rel="stylesheet" href="shared/guided-chat.css?v=2">
<style>
  body { background: var(--white); }
  .phone-frame { background: var(--white); }
  :root {
    --vert-accent: var(--surface-bold);
    --vert-accent-light: var(--primary-20);
    --vert-accent-dark: var(--icon-medium);
  }

  /* ============= TOP BAR ============== */
  .top-bar {
    height: 56px; padding: 0 var(--space-4);
    display: flex; align-items: center; gap: var(--space-3);
    background: var(--white); flex-shrink: 0;
    border-bottom: 1px solid transparent; position: relative; z-index: 30;
  }
  .top-bar .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface-ghost); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: var(--grey-100);
  }
  .top-bar .title-area { flex: 1; min-width: 0; }
  .top-bar .title-area .t1 { font-size: 16px; font-weight: 700; color: var(--grey-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-bar .title-area .t2 { font-size: 11px; font-weight: 500; color: var(--grey-60); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ============= VIEW SWITCHING ============== */
  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }
  .view-body { flex: 1; overflow-y: auto; padding: var(--space-3) 0 var(--space-7); }
  .section-h {
    font-size: 11px; font-weight: 700; color: var(--grey-60);
    letter-spacing: 0.6px; text-transform: uppercase;
    margin: var(--space-5) var(--space-4) var(--space-3);
  }

  /* ============= CONTINUE WHERE YOU LEFT OFF ============== */
  .continue-card {
    width: calc(100% - 2 * var(--space-4));
    margin: var(--space-3) var(--space-4) 0;
    display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: 18px;
    background: var(--surface-bold); color: white;
    cursor: pointer; transition: transform 0.15s; text-align: left;
    border: none; font-family: var(--font);
  }
  .continue-card:hover { transform: translateY(-2px); }
  .continue-card .cc-thumb {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    background: rgba(255,255,255,0.18); color: white;
    display: flex; align-items: center; justify-content: center;
  }
  .continue-card .cc-text { flex: 1; min-width: 0; }
  .continue-card .cc-title { font-size: 15px; font-weight: 800; letter-spacing: -0.2px; }
  .continue-card .cc-meta { font-size: 12px; font-weight: 500; opacity: 0.85; margin-top: 2px; }
  .continue-card .cc-progress { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.25); margin-top: 8px; overflow: hidden; }
  .continue-card .cc-fill { height: 100%; background: white; border-radius: 3px; }
  .continue-card .cc-arrow { flex-shrink: 0; opacity: 0.9; }

  /* ============= CATEGORY ROWS (Seekho map) ============== */
  .cat-scroll {
    display: flex; gap: 10px; overflow-x: auto;
    padding: 0 var(--space-4) 4px; scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-tile {
    flex: 0 0 168px; text-align: left;
    border: 1px solid var(--grey-40); border-radius: 14px;
    padding: 14px; background: white; cursor: pointer;
    font-family: var(--font); display: flex; flex-direction: column; gap: 6px;
    min-height: 92px; transition: all 0.15s;
  }
  .cat-tile:hover { border-color: var(--vert-accent); transform: translateY(-2px); }
  .cat-tile .ct-badge {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--vert-accent-light); color: var(--vert-accent);
    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900;
  }
  .cat-tile .ct-title { font-size: 13px; font-weight: 700; color: var(--grey-100); line-height: 1.3; }
  .cat-tile .ct-meta { font-size: 11px; color: var(--text-low); font-weight: 600; margin-top: auto; }

  /* ============= COURSE — in-chat ============== */
  .plan-card, .lesson-big, .badge-card, .wa-card {
    align-self: stretch; background: white;
    border: 1px solid var(--stroke-subtle); border-radius: 18px;
    padding: 16px; margin: 4px 0 8px; box-shadow: var(--shadow-sm);
  }
  .plan-card .pl-h { font-size: 11px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; color: var(--vert-accent); margin-bottom: 12px; }
  .plan-card .pl-step { display: flex; align-items: flex-start; gap: 11px; padding: 7px 0; border-bottom: 1px solid var(--grey-20); }
  .plan-card .pl-step:last-child { border-bottom: none; }
  .plan-card .pl-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--vert-accent-light); color: var(--vert-accent); font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
  .plan-card .pl-t { font-size: 13.5px; font-weight: 600; color: var(--grey-100); line-height: 1.35; }

  .lesson-big { background: linear-gradient(135deg, #f3f0ff 0%, var(--surface-ghost) 100%); border-color: var(--primary-20); }
  .lesson-big .lb-step { font-size: 10.5px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: var(--vert-accent); }
  .lesson-big .lb-h { font-size: 19px; font-weight: 900; letter-spacing: -0.3px; color: var(--grey-100); margin: 6px 0 8px; line-height: 1.2; }
  .lesson-big .lb-body { font-size: 14px; line-height: 1.55; color: var(--grey-90); }

  .badge-card { text-align: center; background: linear-gradient(135deg, #3900ad 0%, #6464ff 80%); border: none; color: white; }
  .badge-card .bc-ring { width: 64px; height: 64px; margin: 0 auto 10px; border-radius: 50%; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; }
  .badge-card .bc-h { font-size: 17px; font-weight: 900; letter-spacing: -0.2px; }
  .badge-card .bc-sub { font-size: 13px; opacity: 0.9; margin-top: 4px; line-height: 1.4; }

  /* WhatsApp share card */
  .wa-card { background: #e7fce1; border-color: #b7e6ab; }
  .wa-card .wa-h { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 800; letter-spacing: 0.3px; text-transform: uppercase; color: #1d8a3a; margin-bottom: 8px; }
  .wa-card .wa-bubble { background: white; border-radius: 12px; border-top-left-radius: 3px; padding: 11px 13px; font-size: 13.5px; line-height: 1.5; color: var(--grey-100); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .wa-card .wa-send { width: 100%; margin-top: 11px; background: #25d366; color: white; border: none; border-radius: var(--radius-pill); padding: 11px; font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* In-chat end buttons */
  .course-end { align-self: stretch; display: flex; flex-direction: column; gap: 9px; margin: 6px 0 8px; }
  .ce-btn {
    border: 1px solid var(--stroke-subtle); background: white;
    border-radius: 14px; padding: 13px 14px; font-family: var(--font);
    font-size: 14px; font-weight: 700; color: var(--text-high);
    cursor: pointer; display: flex; align-items: center; gap: 11px; text-align: left; transition: all 0.15s;
  }
  .ce-btn:hover { border-color: var(--vert-accent); }
  .ce-btn .ce-icon { flex-shrink: 0; width: 32px; height: 32px; border-radius: 9px; background: var(--vert-accent-light); color: var(--vert-accent); display: flex; align-items: center; justify-content: center; }
  .ce-btn .ce-text { flex: 1; min-width: 0; }
  .ce-btn .ce-sub { font-size: 11.5px; font-weight: 500; color: var(--text-low); margin-top: 1px; }
  .ce-btn.primary { background: var(--vert-accent); border-color: var(--vert-accent); color: white; }
  .ce-btn.primary .ce-icon { background: rgba(255,255,255,0.2); color: white; }
  .ce-btn.primary .ce-sub { color: rgba(255,255,255,0.85); }

  /* ============= REMINDER BOTTOM SHEET ============== */
  .sheet-backdrop { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.45); display: none; align-items: flex-end; opacity: 0; transition: opacity 0.2s ease; }
  .sheet-backdrop.open { display: flex; opacity: 1; }
  .sheet { width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 10px var(--space-4) calc(var(--space-5) + env(safe-area-inset-bottom, 0px)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.2,0.9,0.3,1); max-height: 88%; overflow-y: auto; }
  .sheet-backdrop.open .sheet { transform: translateY(0); }
  .sheet-grab { width: 38px; height: 4px; border-radius: 2px; background: var(--grey-40); margin: 0 auto 14px; }
  .sheet-h { font-size: 19px; font-weight: 900; letter-spacing: -0.3px; color: var(--grey-100); }
  .sheet-sub { font-size: 13px; color: var(--grey-80); line-height: 1.45; margin-top: 6px; }
  .sheet-group { margin-top: 18px; }
  .sheet-group-h { font-size: 11px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-low); margin-bottom: 10px; }
  .sheet-opts { display: flex; flex-wrap: wrap; gap: 8px; }
  .sheet-opt { border: 1.5px solid var(--grey-40); background: white; border-radius: 999px; padding: 9px 15px; font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-high); cursor: pointer; transition: all 0.12s; }
  .sheet-opt.sel { border-color: var(--vert-accent); background: var(--primary-20); color: var(--vert-accent-dark); font-weight: 700; }
  .sheet-set { width: 100%; margin-top: 22px; background: var(--vert-accent); color: white; border: none; border-radius: var(--radius-pill); padding: 15px; font-family: var(--font); font-size: 15px; font-weight: 800; cursor: pointer; }

  @media (min-width: 600px) {
    .phone-frame { box-shadow: var(--shadow-lg); border-radius: 32px; margin-top: 24px; height: calc(100vh - 48px); }
    body { background: var(--surface-moderate); }
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- ========================== HOME ========================== -->
  <div class="view active" id="view-home">
    <div class="top-bar">
      <button class="icon-btn" onclick="window.location.href='index.html'" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="title-area">
        <div class="t1">Micro Learning</div>
        <div class="t2">Got 10 min? Learn one thing well.</div>
      </div>
    </div>

    <div class="view-body">
      <!-- Continue where you left off — on top -->
      <div class="section-h" style="margin-top: var(--space-2)">Continue where you left off</div>
      <button class="continue-card" id="continue_card" onclick="continueCourse()"></button>

      <!-- Seekho category rows -->
      <div id="cat_host"><!-- renderCategories() --></div>
    </div>
  </div>

  <!-- ========================== COURSE (in-chat) ========================== -->
  <div class="view" id="view-course">
    <div class="top-bar">
      <button class="icon-btn" onclick="showView('home')" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="title-area">
        <div class="t1" id="course_title">Course</div>
        <div class="t2" id="course_sub">Micro Learning</div>
      </div>
    </div>
    <div class="guided-chat" id="courseChat"></div>
  </div>

  <!-- ========================== REMINDER SHEET ========================== -->
  <div class="sheet-backdrop" id="reminderSheet" onclick="if(event.target===this)closeReminderSheet()">
    <div class="sheet">
      <div class="sheet-grab"></div>
      <div class="sheet-h">I'll remind you to keep learning</div>
      <div class="sheet-sub">First nudge lands <strong>tomorrow</strong>. Pick when and how often.</div>
      <div class="sheet-group">
        <div class="sheet-group-h">Time of day</div>
        <div class="sheet-opts" id="rem-time">
          <button class="sheet-opt" data-v="Morning (8 AM)">Morning · 8 AM</button>
          <button class="sheet-opt sel" data-v="Evening (7 PM)">Evening · 7 PM</button>
          <button class="sheet-opt" data-v="Night (9 PM)">Night · 9 PM</button>
        </div>
      </div>
      <div class="sheet-group">
        <div class="sheet-group-h">How often</div>
        <div class="sheet-opts" id="rem-freq">
          <button class="sheet-opt sel" data-v="every day">Every day</button>
          <button class="sheet-opt" data-v="every other day">Every other day</button>
          <button class="sheet-opt" data-v="on weekends">Weekends</button>
        </div>
      </div>
      <button class="sheet-set" onclick="confirmReminder()">Set my learning reminder</button>
    </div>
  </div>

</div>

<script src="shared/multimodal.js?v=2"></script>
<script src="shared/guided-chat.js?v=2"></script>
<script>
/* =========================================================================
 * VIEW SWITCHING — home + one in-chat course view
 * ========================================================================= */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const body = document.querySelector('#view-' + name + ' .view-body');
  if (body) body.scrollTop = 0;
}

/* =========================================================================
 * SEEKHO CONTENT MAP — categories, each with a row of sub-courses.
 * Sourced from Seekho_Content_Map (Top 100 Subthemes), AI expanded.
 * ========================================================================= */
const CATEGORIES = [
  { id: 'content', name: 'Content creation', subs: [
    { id: 'yt-channel',   title: 'YouTube channel kaise banaye' },
    { id: 'shorts-viral', title: 'Shorts viral karne ke tips' },
    { id: 'thumbnail',    title: 'Thumbnail design secrets' },
    { id: 'video-4k',     title: 'Video 4K quality kaise kare' },
    { id: 'dolly-zoom',   title: 'Dolly zoom effect editing' },
  ] },
  { id: 'instagram', name: 'Instagram', subs: [
    { id: 'reel-1m',      title: 'Reel par 1 million views' },
    { id: 'ig-unfreeze',  title: 'Instagram account unfreeze' },
    { id: 'watch-time',   title: 'Reel watch-time kaise badhaye' },
    { id: 'hidden-growth',title: 'Hidden page growth settings' },
  ] },
  { id: 'ai', name: 'AI', subs: [
    { id: 'ai-kya-hai',   title: 'AI kya hai' },
    { id: 'ai-image',     title: 'AI se image kaise banayein' },
    { id: 'ai-prompt',    title: 'Advanced prompt engineering' },
    { id: 'ai-ppt',       title: 'ChatGPT se PPT banao' },
    { id: 'ai-blog',      title: 'AI se blog writing earning' },
  ] },
  { id: 'income', name: 'Part-time income', subs: [
    { id: 'delivery-app', title: 'Delivery app se kamai' },
    { id: 'dropshipping', title: 'Dropshipping product research' },
    { id: 'wa-marketing', title: 'WhatsApp se marketing' },
    { id: 'candle-biz',   title: 'Candle making business' },
    { id: 'no-ad-cust',   title: 'Bina ad ke customer laao' },
  ] },
  { id: 'money', name: 'Money & finance', subs: [
    { id: 'cibil',        title: 'CIBIL score 750+ kaise badhaye' },
    { id: 'budgeting',    title: 'Paisa track aur budgeting' },
    { id: 'emergency',    title: 'Emergency fund kaise banaye' },
    { id: 'stock-start',  title: 'Stock market me pehla kadam' },
    { id: 'intraday',     title: 'Intraday trading basics' },
  ] },
  { id: 'self', name: 'Self-growth', subs: [
    { id: 'overthinking', title: 'Overthinking se bahar aaye' },
    { id: 'morning',      title: 'Morning routine kaise fix kare' },
    { id: 'mental',       title: 'Mental strength kaise badhaye' },
    { id: 'comfort-zone', title: 'Comfort zone se bahar niklo' },
  ] },
];

// Flat lookup: subId → { sub, catId, catName, nextSub }
const SUB_INDEX = {};
CATEGORIES.forEach(cat => cat.subs.forEach((s, i) => {
  SUB_INDEX[s.id] = { sub: s, catId: cat.id, catName: cat.name, next: cat.subs[i + 1] || null };
}));

/* =========================================================================
 * COURSE CONTENT — specific lessons for the AI track; everything else uses
 * a contextual generic builder (keeps the file lean, every course works).
 * ========================================================================= */
const COURSE_CONTENT = {
  'ai-kya-hai': {
    plan: ['AI matlab kya hai', 'Roz ke kaam mein AI', 'Tools jo aapke paas hain', 'Aaj ek cheez try karo'],
    lessons: [
      { h: 'AI matlab kya?', body: 'AI ek smart assistant hai jo aapke instruction (prompt) padhke kaam karta hai — likhna, image banana, sawaalon ke jawab dena. Koi magic nahi; bas patterns se seekha hua hai.' },
      { h: 'Roz ke kaam mein', body: 'Caption likhwana, video ideas, lambi cheez ka short summary, translation, image — sab AI kar sakta hai. Aap soch ko shabdon mein bolo, AI baaki sambhaal lega.' },
      { h: 'Jo tools aapke paas hain', body: 'ChatGPT aur Gemini (text ke liye), aur image banane ke free tools — sab phone par chal jaate hain. Shuru karne ke liye kuch download nahi chahiye.' },
      { h: 'Aaj ek cheez try karo', body: 'ChatGPT kholo aur poochho: "5 reel ideas do [aapka topic] ke liye." Bas — aapne AI use kar liya. Yahi pehla kadam hai.' },
    ],
  },
  'ai-image': {
    plan: ['Image AI kaise samajhta hai', 'Achha prompt ka formula', 'Free tools', 'Aaj ek image banao'],
    lessons: [
      { h: 'AI image kaise banata hai', body: 'Aap shabdon mein scene describe karte ho, AI woh picture bana deta hai. Jitna clear aur specific description, utni behtar image milegi.' },
      { h: 'Achhe prompt ka formula', body: 'Subject + style + detail + mood. Jaise: "A chai stall at sunset, cinematic, warm light, realistic." Chote prompt = aam image; rich prompt = standout image.' },
      { h: 'Konse tools free hain', body: 'Bing/Copilot image, Gemini, aur kai free apps — phone se hi. Ek prompt likho, 4 options aati hain, best chuno.' },
      { h: 'Aaj banao', body: 'Apne agle reel ka thumbnail AI se banao — ek line mein describe karo, generate dabao, aur dekho kaise turant ek option mil jaata hai.' },
    ],
  },
  'ai-prompt': {
    plan: ['Role do', 'Constraints lagao', 'Example do (few-shot)', 'Refine karte raho'],
    lessons: [
      { h: 'Role se shuru karo', body: 'Prompt ki shuruaat mein role do: "You are a YouTube growth expert…". Isse AI ka jawab turant sharp aur on-point ho jaata hai.' },
      { h: 'Constraints lagao', body: 'Exactly kya chahiye batao: "10 titles do, no emojis, har ek 60 characters se kam." Vague prompt ka jawab bhi vague aata hai.' },
      { h: 'Example do (few-shot)', body: 'Ek-do example do ki output kaisa chahiye. AI pattern pakad leta hai aur waise hi aage banata hai — yeh sabse powerful trick hai.' },
      { h: 'Pehla jawab final nahi', body: 'Iterate karo: "make it punchier", "shorter", "thoda Hinglish mein". Achha output baat-cheet se banta hai, ek shot mein nahi.' },
    ],
  },
  'ai-ppt': {
    plan: ['Pehle outline', 'Slide content', 'Speaker notes', 'Aaj ek PPT banao'],
    lessons: [
      { h: 'Outline pehle banwao', body: 'ChatGPT se poochho: "Make a 6-slide outline on [topic] — title + 3 bullets per slide." Structure pehle, design baad mein.' },
      { h: 'Slide ka content', body: 'Har slide ka content generate karwao, phir Google Slides ya PowerPoint mein paste karo. 10 minute mein draft taiyaar.' },
      { h: 'Speaker notes', body: 'Bolo "add short speaker notes for each slide." Ab aapke paas bolne ke liye points bhi hain — presentation ready.' },
      { h: 'Aaj try karo', body: 'Apne agle kaam ki ek 5-slide PPT AI se banao. Dekhna kitna time bachta hai.' },
    ],
  },
  'ai-blog': {
    plan: ['Kaam kahan milta hai', 'Quality kaise rakhein', 'Pricing', 'Aaj pehla sample'],
    lessons: [
      { h: 'Kaam kahan milega', body: 'Freelance sites aur local businesses ko blogs, captions, product descriptions chahiye. AI se aap fast deliver kar sakte ho — yahi aapka edge hai.' },
      { h: 'Quality kaise rakhein', body: 'AI se draft banwao, phir aap edit + fact-check karo aur apni awaaz add karo. Sirf copy-paste se kaam nahi chalega — value aapke touch mein hai.' },
      { h: 'Charge kitna karein', body: 'Per article ya monthly retainer. Pehle ek sample dikhao, chhote client se shuru karo, phir rate badhao.' },
      { h: 'Aaj ka kadam', body: 'Ek topic chuno, AI se ek sample blog banao, edit karo — yeh aapke portfolio ka pehla piece hai.' },
    ],
  },
};

function buildCourse(sub) {
  if (COURSE_CONTENT[sub.id]) return COURSE_CONTENT[sub.id];
  const t = sub.title;
  return {
    plan: ['Why it matters', 'The core method', 'Common mistakes', 'Your action step'],
    lessons: [
      { h: 'Why it matters', body: `"${t}" — get the pattern right and results come fast. We'll skip the theory and go straight to how it's actually done.` },
      { h: 'The method, step by step', body: 'Start with the simplest version and do it once, end to end — even if it\'s rough. Then improve one thing each time. Doing beats waiting to feel "ready".' },
      { h: 'What trips most people up', body: 'Two traps: trying to be perfect on day one, and copying others without understanding why it works. Understand the why, then make it your own.' },
      { h: 'Your action for today', body: 'Pick one small thing from this and do it in the next 10 minutes. That single action is what turns "watched it" into "learned it".' },
    ],
  };
}

/* =========================================================================
 * HOME — continue card + category rows
 * ========================================================================= */
const RESUME = { subId: 'ai-image', lesson: 2 };   // "continue where you left off" target

function renderHome() {
  // Continue card (returning user only — zero-state omits it)
  const cc = document.getElementById('continue_card');
  if (cc) {
    const r = SUB_INDEX[RESUME.subId];
    const total = buildCourse(r.sub).lessons.length;
    const pct = Math.round((RESUME.lesson / total) * 100);
    cc.innerHTML = `
      <span class="cc-thumb"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
      <span class="cc-text">
        <span class="cc-title">${r.sub.title}</span>
        <span class="cc-meta">${r.catName} · Lesson ${RESUME.lesson + 1} of ${total}</span>
        <span class="cc-progress"><span class="cc-fill" style="width:${pct}%"></span></span>
      </span>
      <span class="cc-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></span>`;
  }

  // Category rows
  const host = document.getElementById('cat_host');
  host.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.innerHTML = `<div class="section-h">${cat.name}</div><div class="cat-scroll"></div>`;
    const scroll = section.querySelector('.cat-scroll');
    cat.subs.forEach(s => {
      const lessons = buildCourse(s).lessons.length;
      const tile = document.createElement('button');
      tile.className = 'cat-tile';
      tile.innerHTML = `
        <span class="ct-badge">${cat.name.charAt(0)}</span>
        <span class="ct-title">${s.title}</span>
        <span class="ct-meta">${lessons} lessons · ~${lessons * 2} min</span>`;
      tile.onclick = () => openCourse(s.id);
      scroll.appendChild(tile);
    });
    host.appendChild(section);
  });
}

function continueCourse() { openCourse(RESUME.subId, RESUME.lesson); }

/* =========================================================================
 * COURSE FLOW — all in the chat: plan → big lesson cards → finish options
 * ========================================================================= */
let course = { subId: null, data: null, idx: 0 };

function chatEl() { return document.getElementById('courseChat'); }

function openCourse(subId, resumeLesson) {
  const info = SUB_INDEX[subId];
  if (!info) return;
  course = { subId, data: buildCourse(info.sub), idx: 0 };
  document.getElementById('course_title').textContent = info.sub.title;
  document.getElementById('course_sub').textContent = info.catName;
  showView('course');
  const chat = chatEl();
  chat.innerHTML = '';

  if (typeof resumeLesson === 'number') {
    // Resume straight into a lesson (Continue where you left off).
    window.GC.appendAi(chat, `Welcome back — let's pick up "${info.sub.title}" where you left off.`);
    course.idx = resumeLesson;
    setTimeout(() => showLesson(course.idx), 700);
    return;
  }

  window.GC.appendAi(chat, `Let's get started — I'm creating your learning plan for "${info.sub.title}"…`);
  window.GC.status(chat, 'building your plan', 1100).then(() => showPlan());
}

function showPlan() {
  const chat = chatEl();
  const steps = course.data.plan;
  const card = document.createElement('div');
  card.className = 'plan-card';
  card.innerHTML = `<div class="pl-h">📋 Your learning plan · ${steps.length} short lessons</div>` +
    steps.map((s, i) => `<div class="pl-step"><span class="pl-num">${i + 1}</span><span class="pl-t">${s}</span></div>`).join('');
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(() => {
    window.GC.appendChips(chat, [{ text: 'Start learning →', key: 'go' }], () => showLesson(0));
  }, 500);
}

function showLesson(i) {
  course.idx = i;
  const chat = chatEl();
  const lessons = course.data.lessons;
  const lesson = lessons[i];
  const card = document.createElement('div');
  card.className = 'lesson-big';
  card.innerHTML = `
    <div class="lb-step">Lesson ${i + 1} of ${lessons.length}</div>
    <div class="lb-h">${lesson.h}</div>
    <div class="lb-body">${lesson.body}</div>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    const last = i >= lessons.length - 1;
    window.GC.appendChips(chat, [{ text: last ? 'Continue →' : 'Next →', key: 'n' }], () => {
      if (last) showWrap();
      else showLesson(i + 1);
    });
  }, 450);
}

function showWrap() {
  const chat = chatEl();
  window.GC.appendAi(chat, "That's the whole skill. Quick recap done — ready to lock it in?");
  setTimeout(() => {
    window.GC.appendChips(chat, [{ text: 'Finish course ✓', key: 'fin' }], () => finishCourse());
  }, 500);
}

function finishCourse() {
  const chat = chatEl();
  const info = SUB_INDEX[course.subId];
  const badge = document.createElement('div');
  badge.className = 'badge-card';
  badge.innerHTML = `
    <div class="bc-ring"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="bc-h">Course complete!</div>
    <div class="bc-sub">${info.sub.title} — nicely done.</div>`;
  chat.appendChild(badge);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    const end = document.createElement('div');
    end.className = 'course-end';
    const next = info.next;
    end.innerHTML = `
      <button class="ce-btn primary" id="ce_remind">
        <span class="ce-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="ce-text">Remind me to practise<span class="ce-sub">A quick nudge so the skill sticks</span></span>
      </button>
      ${next ? `<button class="ce-btn" id="ce_next">
        <span class="ce-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
        <span class="ce-text">Start the next course<span class="ce-sub">${next.title}</span></span>
      </button>` : ''}
      <button class="ce-btn" id="ce_share">
        <span class="ce-icon" style="background:#e7fce1;color:#1d8a3a"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3a9 9 0 00-7.8 13.5L3 21l4.7-1.2A9 9 0 1012 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>
        <span class="ce-text">Share your badge<span class="ce-sub">Send it on WhatsApp</span></span>
      </button>`;
    chat.appendChild(end);
    chat.scrollTop = chat.scrollHeight;
    document.getElementById('ce_remind').onclick = openReminderSheet;
    if (next) document.getElementById('ce_next').onclick = () => openCourse(next.id);
    document.getElementById('ce_share').onclick = () => shareBadge(info.sub.title);
  }, 650);
}

/* WhatsApp share — a WhatsApp-style card + a real share via wa.me */
function shareBadge(title) {
  const chat = chatEl();
  const msg = `🎓 I just finished "${title}" on Seekho Micro Learning! Learning one small skill at a time. Try it 👉`;
  const card = document.createElement('div');
  card.className = 'wa-card';
  card.innerHTML = `
    <div class="wa-h"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3a9 9 0 00-7.8 13.5L3 21l4.7-1.2A9 9 0 1012 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg> Share on WhatsApp</div>
    <div class="wa-bubble">${msg}</div>
    <button class="wa-send" onclick="sendWhatsApp('${msg.replace(/'/g, "\\'")}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l1.65-4.5A8.5 8.5 0 1112 20.5a8.4 8.4 0 01-4.2-1.1L2 21z"/></svg>
      Send on WhatsApp
    </button>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
}
function sendWhatsApp(msg) {
  try { window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank'); } catch (e) {}
  showToast('Opening WhatsApp…');
}

/* =========================================================================
 * REMINDER SHEET + toast
 * ========================================================================= */
let remTime = 'Evening (7 PM)', remFreq = 'every day';
function openReminderSheet() { document.getElementById('reminderSheet').classList.add('open'); }
function closeReminderSheet() { document.getElementById('reminderSheet').classList.remove('open'); }
function wireSheetGroup(groupId, set) {
  document.querySelectorAll(`#${groupId} .sheet-opt`).forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} .sheet-opt`).forEach(x => x.classList.remove('sel'));
      b.classList.add('sel'); set(b.dataset.v);
    });
  });
}
function confirmReminder() {
  closeReminderSheet();
  const clock = (remTime.match(/\(([^)]+)\)/) || [])[1] || remTime;
  showToast(`Done — I'll remind you ${remFreq} at ${clock}. First nudge: tomorrow.`);
}
function showToast(text) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);max-width:80%;text-align:center;background:var(--surface-bold);color:#fff;padding:11px 18px;border-radius:16px;font-family:var(--font);font-size:13px;font-weight:600;z-index:300;box-shadow:var(--shadow-md);opacity:0;transition:opacity .25s ease';
  t.textContent = text;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.style.opacity = '1');
  setTimeout(() => t.style.opacity = '0', 2600);
  setTimeout(() => t.remove(), 3000);
}

/* =========================================================================
 * INIT
 * ========================================================================= */
(function init() {
  renderHome();
  wireSheetGroup('rem-time', v => remTime = v);
  wireSheetGroup('rem-freq', v => remFreq = v);

  const q = (new URLSearchParams(window.location.search).get('q') || '').toLowerCase();
  if (q) {
    for (const id of Object.keys(SUB_INDEX)) {
      if (q.includes(id.split('-')[0])) { setTimeout(() => openCourse(id), 200); break; }
    }
  }
})();
</script>
</body>
